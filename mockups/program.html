<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program — Workout Programming</title>
<style>
  :root {
    --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460;
    --accent: #e94560; --accent2: #533483; --text: #eee;
    --text-muted: #999; --border: #2a2a4a; --success: #2ecc71;
    --warning: #f39c12; --danger: #e74c3c; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
  nav .nav-links { display: flex; gap: 20px; }
  nav .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; padding: 6px 0; border-bottom: 2px solid transparent; transition: .2s; }
  nav .nav-links a:hover, nav .nav-links a.active { color: var(--text); border-bottom-color: var(--accent); }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  .breadcrumb { font-size: 14px; margin-bottom: 16px; color: var(--text-muted); }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb span { margin: 0 6px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .page-header h1 { font-size: 24px; font-weight: 600; }
  .page-notes { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }

  .btn { padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; transition: .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #d63852; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-danger { background: var(--danger); color: #fff; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  tr:hover { background: rgba(255,255,255,.03); }

  /* ── Add form row ── */
  .add-row-form { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text-muted); }
  .field input, .field textarea { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-family: inherit; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }

  .badge { font-size: 12px; padding: 3px 8px; border-radius: 12px; background: var(--surface2); color: var(--text-muted); }
  .empty-cell { text-align: center; padding: 40px; color: var(--text-muted); }

  .alert { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px; font-size: 14px; }
  .alert-success { background: #0e2f1a; color: var(--success); border: 1px solid #1a4a2a; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center; }
  .modal.show { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 440px; max-width: 90vw; }
  .modal-box h2 { font-size: 20px; margin-bottom: 16px; }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
</style>
</head>
<body>

<nav>
  <span class="logo">LiftLog</span>
  <div class="nav-links">
    <a href="index.html">Programs</a>
    <a href="exercises.html">Exercises</a>
    <a href="data.html">Data</a>
  </div>
</nav>

<div class="container">
  <div class="breadcrumb">
    <a href="index.html">Programs</a><span>/</span><strong id="prog-breadcrumb-name">Push/Pull/Legs 2025</strong>
  </div>

  <div class="page-header">
    <h1 id="prog-name">Push/Pull/Legs 2025</h1>
  </div>
  <div class="page-notes" id="prog-notes">6-day rotation with deload every 6th week</div>

  <div id="alert-area"></div>

  <div class="add-row-form" id="add-form">
    <div class="field" style="flex:2">
      <label>Mesocycle Name</label>
      <input type="text" id="meso-name" placeholder="e.g. 4-Week Strength Block" autocomplete="off">
    </div>
    <div class="field" style="flex:1">
      <label>Microcycle Length (days)</label>
      <input type="number" id="meso-length" value="7" min="1" max="14">
    </div>
    <div class="field" style="flex:1">
      <label>Start Date</label>
      <input type="date" id="meso-date">
    </div>
    <button class="btn btn-primary" onclick="addMesocycle()">+ Add Mesocycle</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Length</th>
        <th>Start Date</th>
        <th>Workouts</th>
        <th style="width:160px">Actions</th>
      </tr>
    </thead>
    <tbody id="meso-table-body">
      <!-- filled by JS -->
    </tbody>
  </table>
  <div id="empty-state" class="empty-cell" style="display:none">No mesocycles yet. Create your first training block above.</div>
</div>

<!-- Edit Modal -->
<div class="modal" id="edit-modal">
  <div class="modal-box">
    <h2>Edit Mesocycle</h2>
    <form id="edit-form" onsubmit="handleEditSubmit(event)">
      <input type="hidden" id="edit-id">
      <div class="field" style="margin-bottom:12px">
        <label>Name</label>
        <input type="text" id="edit-name" required>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label>Microcycle Length</label>
        <input type="number" id="edit-length" min="1" max="14" required>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label>Start Date</label>
        <input type="date" id="edit-date" required>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-outline" onclick="hideEditModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
// ── State ──
let mesocycles = [
  { id: 1, name: 'Block 1 — Hypertrophy', length: 7, date: '2025-03-10', workoutCount: 4 },
  { id: 2, name: 'Block 2 — Strength',    length: 7, date: '2025-04-07', workoutCount: 4 },
  { id: 3, name: 'Block 3 — Peak',        length: 4, date: '2025-05-05', workoutCount: 3 },
];
let nextId = 4;

function render() {
  const tbody = document.getElementById('meso-table-body');
  if (mesocycles.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
  } else {
    document.getElementById('empty-state').style.display = 'none';
    tbody.innerHTML = mesocycles.map(m => `
      <tr>
        <td><strong>${esc(m.name)}</strong></td>
        <td>${m.length} days</td>
        <td>${new Date(m.date).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}</td>
        <td><span class="badge">${m.workoutCount} workouts</span></td>
        <td>
          <a href="mesocycle.html?id=${m.id}" class="btn btn-outline btn-sm">View</a>
          <button class="btn btn-outline btn-sm" onclick="editMesocycle(${m.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMesocycle(${m.id})">Del</button>
        </td>
      </tr>
    `).join('');
  }
}

function esc(s) { return s.replace(/</g,'&lt;'); }

function addMesocycle() {
  const name = document.getElementById('meso-name').value.trim();
  const length = parseInt(document.getElementById('meso-length').value);
  const date = document.getElementById('meso-date').value;
  if (!name) return;
  mesocycles.push({ id: nextId++, name, length, date: date || new Date().toISOString().split('T')[0], workoutCount: 0 });
  document.getElementById('meso-name').value = '';
  showAlert('success', `"${esc(name)}" added.`);
  render();
}

function editMesocycle(id) {
  const m = mesocycles.find(x => x.id === id);
  document.getElementById('edit-id').value = m.id;
  document.getElementById('edit-name').value = m.name;
  document.getElementById('edit-length').value = m.length;
  document.getElementById('edit-date').value = m.date;
  document.getElementById('edit-modal').classList.add('show');
}

function hideEditModal() { document.getElementById('edit-modal').classList.remove('show'); }

function handleEditSubmit(e) {
  e.preventDefault();
  const id = Number(document.getElementById('edit-id').value);
  const m = mesocycles.find(x => x.id === id);
  m.name = document.getElementById('edit-name').value.trim();
  m.length = parseInt(document.getElementById('edit-length').value);
  m.date = document.getElementById('edit-date').value;
  hideEditModal();
  showAlert('success', `"${esc(m.name)}" updated.`);
  render();
}

function deleteMesocycle(id) {
  const m = mesocycles.find(x => x.id === id);
  if (!confirm(`Delete "${m.name}"? All workouts inside will also be deleted.`)) return;
  mesocycles = mesocycles.filter(x => x.id !== id);
  showAlert('success', `"${esc(m.name)}" deleted.`);
  render();
}

function showAlert(type, msg) {
  const area = document.getElementById('alert-area');
  area.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => area.innerHTML = '', 4000);
}

render();
</script>
</body>
</html>
